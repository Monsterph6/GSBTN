name: Apply v0.4.0 source

on:
  issues:
    types: [opened]

permissions:
  contents: write

jobs:
  apply:
    if: ${{ github.event.issue.title == '[DEV] Apply v0.4.0 source' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout feature branch
        uses: actions/checkout@v4
        with:
          ref: agent/duplicate-filter
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
      - name: Fetch verified source payload
        shell: bash
        run: |
          set -euo pipefail
          git fetch origin source-payload-v0.4.0
          mkdir -p /tmp/gsbtn-v040
          git archive origin/source-payload-v0.4.0 | tar -x -C /tmp/gsbtn-v040
          cat /tmp/gsbtn-v040/app_00.txt /tmp/gsbtn-v040/app_01.txt /tmp/gsbtn-v040/app_02.txt /tmp/gsbtn-v040/app_03.txt /tmp/gsbtn-v040/app_04.txt /tmp/gsbtn-v040/app_05.txt > app.py
          cat /tmp/gsbtn-v040/core_00.txt /tmp/gsbtn-v040/core_01.txt /tmp/gsbtn-v040/core_02.txt /tmp/gsbtn-v040/core_03.txt /tmp/gsbtn-v040/core_04.txt > core.py
          cp /tmp/gsbtn-v040/deployment_config.py deployment_config.py
          cp /tmp/gsbtn-v040/lan_server.py lan_server.py
          cp /tmp/gsbtn-v040/remote_core.py remote_core.py
          cp /tmp/gsbtn-v040/setup.iss setup.iss
          cp /tmp/gsbtn-v040/VERSION.txt VERSION.txt
          cp /tmp/gsbtn-v040/README.md README.md
          cp /tmp/gsbtn-v040/SCHEMA.md SCHEMA.md
          cp /tmp/gsbtn-v040/.github/workflows/release.yml .github/workflows/release.yml
          mkdir -p tests
          cp /tmp/gsbtn-v040/tests/test_features.py tests/test_features.py
          rm -rf .feature_payload .source_parts .decode-trigger .github/workflows/introspect-source.yml
      - name: Verify source and run tests
        shell: bash
        run: |
          set -euo pipefail
          test "$(cat VERSION.txt)" = "0.4.0"
          python -m py_compile app.py core.py deployment_config.py lan_server.py remote_core.py
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          python -m pytest -q
          if find . -path ./.git -prune -o -type f \( -iname '*.db' -o -iname '*.sqlite' -o -iname '*.sqlite3' -o -iname '*.xlsx' -o -iname '*.xls' -o -iname '*.xlsm' -o -iname '*.csv' \) -print | grep -q .; then
            echo 'Forbidden data file found.' >&2
            exit 1
          fi
      - name: Commit feature implementation
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Bổ sung lọc trùng, menu và triển khai LAN ba chế độ"
          git push origin HEAD:agent/duplicate-filter
