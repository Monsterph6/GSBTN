name: Apply GSBTN v0.5.0 patch

on:
  issue_comment:
    types: [created]

permissions:
  contents: write
  issues: write

jobs:
  apply:
    if: ${{ github.event.issue.number == 16 && contains(github.event.comment.body, '[APPLY V050 DIFF]') }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout feature branch
        uses: actions/checkout@v4
        with:
          ref: agent/lan-duplicates-backup
          fetch-depth: 0

      - name: Read patch comments
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh api "repos/$GITHUB_REPOSITORY/issues/16/comments?per_page=100" > comments.json

      - name: Reconstruct patch
        id: reconstruct
        shell: python
        run: |
          import hashlib
          import json
          import os
          import re
          from pathlib import Path

          comments = json.loads(Path('comments.json').read_text(encoding='utf-8'))
          parts: dict[int, str] = {}
          expected_total = 9

          def append_part(number: int, text: str) -> None:
              previous = parts.get(number, '')
              if previous and not previous.endswith('\n') and text:
                  previous += '\n'
              parts[number] = previous + text

          for comment in comments:
              body = str(comment.get('body') or '')
              lines = body.splitlines(keepends=True)
              if not lines:
                  continue
              marker = lines[0].strip()
              content = ''.join(lines[1:])

              match = re.fullmatch(r'GSBTN_V050_DIFF (\d+)/(\d+)', marker)
              if match:
                  number, total = map(int, match.groups())
                  if total == expected_total and number not in parts:
                      parts[number] = content
                  continue

              match = re.fullmatch(r'GSBTN_V050_DIFF_CONT (\d+)/(\d+)', marker)
              if match:
                  number, total = map(int, match.groups())
                  if total == expected_total:
                      append_part(number, content)
                  continue

              match = re.fullmatch(r'GSBTN_V050_DIFF_REPLACE (\d+)/(\d+)', marker)
              if match:
                  number, total = map(int, match.groups())
                  if total != expected_total:
                      continue
                  if number == 9:
                      fixed = []
                      strip_extra = False
                      for line in content.splitlines(keepends=True):
                          if line.startswith('+--- /dev/null'):
                              strip_extra = True
                          if strip_extra and line.startswith('+'):
                              line = line[1:]
                          fixed.append(line)
                      content = ''.join(fixed)
                  parts[number] = content
                  continue

              match = re.fullmatch(r'GSBTN_V050_DIFF_CONT_PLUS1 (\d+)/(\d+)', marker)
              if match:
                  number, total = map(int, match.groups())
                  if total == expected_total:
                      fixed = ''.join(line[1:] if line.startswith('+') else line for line in content.splitlines(keepends=True))
                      append_part(number, fixed)

          expected_parts = set(range(1, expected_total + 1))
          missing = sorted(expected_parts - set(parts))
          patch = ''
          if not missing:
              for number in range(1, expected_total + 1):
                  text = parts[number]
                  if patch and not patch.endswith('\n'):
                      patch += '\n'
                  patch += text
          Path('v050.patch').write_text(patch, encoding='utf-8', newline='\n')

          digest = hashlib.sha256(Path('v050.patch').read_bytes()).hexdigest()
          expected_digest = 'cc206a3b146b2b7ec94983b67b0964598ec2b0723ad4eaedb80384d294d05cbf'
          touched = set()
          for line in patch.splitlines():
              if line.startswith('+++ '):
                  path = line[4:].strip()
                  if path != '/dev/null':
                      touched.add(path[2:] if path.startswith('b/') else path)

          allowed = {
              'app.py', 'core.py', 'deployment_config.py', 'lan_server.py', 'remote_core.py',
              'lan_discovery.py', 'backup_manager.py', 'duplicate_config.py', 'setup.iss',
              'VERSION.txt', 'README.md', 'SCHEMA.md', 'tests/test_advanced_features.py',
          }
          checksum_ok = digest == expected_digest
          paths_ok = touched == allowed
          complete = not missing
          with open(os.environ['GITHUB_OUTPUT'], 'a', encoding='utf-8') as output:
              output.write(f'digest={digest}\n')
              output.write(f'checksum_ok={str(checksum_ok).lower()}\n')
              output.write(f'paths_ok={str(paths_ok).lower()}\n')
              output.write(f'complete={str(complete).lower()}\n')
          Path('diagnostic.txt').write_text(
              f'Expected SHA-256: {expected_digest}\nActual SHA-256:   {digest}\n'
              f'Missing parts: {missing}\nTouched paths: {sorted(touched)}\n', encoding='utf-8'
          )
          print(Path('diagnostic.txt').read_text(encoding='utf-8'))

      - name: Report validation failure
        if: steps.reconstruct.outputs.checksum_ok != 'true' || steps.reconstruct.outputs.paths_ok != 'true' || steps.reconstruct.outputs.complete != 'true'
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          {
            echo 'Bản vá v0.5.0 chưa được áp dụng vì kiểm tra không khớp:'
            echo '```text'
            cat diagnostic.txt
            echo '```'
          } > report.md
          gh issue comment 16 --repo "$GITHUB_REPOSITORY" --body-file report.md
          exit 1

      - name: Apply patch
        shell: bash
        run: |
          git apply --check v050.patch
          git apply v050.patch
          rm -f v050.patch comments.json diagnostic.txt

      - name: Compile sources
        shell: bash
        run: python -m py_compile app.py core.py deployment_config.py lan_server.py remote_core.py lan_discovery.py backup_manager.py duplicate_config.py

      - name: Verify no user data
        shell: bash
        run: |
          if find . -path ./.git -prune -o -type f \( -iname '*.db' -o -iname '*.sqlite' -o -iname '*.sqlite3' -o -iname '*.xlsx' -o -iname '*.xls' -o -iname '*.xlsm' -o -iname '*.csv' \) -print | grep -q .; then
            echo 'Forbidden data file found.' >&2
            exit 1
          fi
          if find . -path ./.git -prune -o -type d \( -name data -o -name backups -o -name update_cache \) -print | grep -q .; then
            echo 'Forbidden data directory found.' >&2
            exit 1
          fi

      - name: Commit feature branch
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add app.py core.py deployment_config.py lan_server.py remote_core.py lan_discovery.py backup_manager.py duplicate_config.py setup.iss VERSION.txt README.md SCHEMA.md tests/test_advanced_features.py
          git commit -m "Bổ sung LAN, lọc trùng nâng cao và sao lưu phục hồi"
          git push origin HEAD:agent/lan-duplicates-backup

      - name: Report success
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh issue comment 16 --repo "$GITHUB_REPOSITORY" --body "Đã áp dụng bản vá v0.5.0 vào nhánh \`agent/lan-duplicates-backup\`; checksum và danh sách tệp đều hợp lệ."
