name: Export feature source

on:
  issues:
    types: [opened]

permissions:
  contents: read
  issues: write

jobs:
  export:
    if: ${{ github.event.issue.title == '[DEV] Export duplicate-filter source' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/duplicate-filter
      - name: Upload source snapshot
        uses: actions/upload-artifact@v4
        with:
          name: duplicate-filter-source
          include-hidden-files: true
          path: |
            .github
            tests
            *.py
            *.md
            *.txt
            *.bat
            *.iss
            .gitignore
      - name: Report workflow run
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh issue comment "${{ github.event.issue.number }}" --body "Snapshot source đã tạo. Run ID: $GITHUB_RUN_ID"
