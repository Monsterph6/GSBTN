name: Bootstrap source repository

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write
  actions: write

jobs:
  unpack-source:
    if: ${{ hashFiles('.bootstrap/part-*') != '' }}
    runs-on: windows-latest

    steps:
      - name: Checkout bootstrap files
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Reconstruct and extract clean source package
        shell: pwsh
        run: |
          $parts = Get-ChildItem ".bootstrap/part-*" -File | Sort-Object Name
          if ($parts.Count -ne 6) {
            throw "Expected 6 bootstrap parts, found $($parts.Count)."
          }

          $base64 = ($parts | ForEach-Object { (Get-Content $_.FullName -Raw).Trim() }) -join ''
          $zipBytes = [Convert]::FromBase64String($base64)
          $zipPath = Join-Path $env:RUNNER_TEMP "gsbtn-source.zip"
          $sourceDir = Join-Path $env:RUNNER_TEMP "gsbtn-source"
          [IO.File]::WriteAllBytes($zipPath, $zipBytes)
          Expand-Archive -Path $zipPath -DestinationPath $sourceDir -Force

          $forbidden = Get-ChildItem $sourceDir -Recurse -File -Force |
            Where-Object { $_.Extension.ToLower() -in '.db','.sqlite','.sqlite3','.xlsx','.xls','.xlsm','.csv' }
          if ($forbidden) {
            $forbidden | ForEach-Object { Write-Error "Forbidden data file: $($_.FullName)" }
            exit 1
          }

          robocopy $sourceDir . /E /R:2 /W:1 /XD .git .bootstrap | Out-Host
          if ($LASTEXITCODE -gt 7) {
            throw "Robocopy failed with exit code $LASTEXITCODE"
          }

          Remove-Item .bootstrap -Recurse -Force
          Remove-Item .github/workflows/bootstrap.yml -Force

      - name: Commit source files
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Thêm mã nguồn ứng dụng và quy trình Release"
          git push origin main

          Start-Sleep -Seconds 8
          gh workflow run release.yml --ref main
