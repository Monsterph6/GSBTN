name: Ping v0.5.0 workflow

on:
  issue_comment:
    types: [created]

permissions:
  contents: write

jobs:
  ping:
    if: ${{ github.event.issue.number == 16 && contains(github.event.comment.body, '[PING V050]') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/lan-duplicates-backup
          fetch-depth: 0
      - run: |
          date -u +%FT%TZ > .v050-ping.txt
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .v050-ping.txt
          git commit -m "Ping workflow v0.5.0"
          git push origin HEAD:agent/lan-duplicates-backup
